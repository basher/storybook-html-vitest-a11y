<!-- Add some CSS from https://github.com/basher/Web-UI-Boilerplate/tree/master/ui/src/css -->
<style>
:root {
    --color-brand: oklch(44.03% 0.1603 303.37); /* rebeccapurple */
    --color-neutral: oklch(59.82% 0 0);
    --color-accent-blue: oklch(71.69% 0.1603 226.5552);

    --webui-color-primary-500: var(--color-brand);
    --webui-color-primary-100: oklch(from var(--color-brand) calc(l + 0.3) c h);
    --webui-color-neutral-900: oklch(
        from var(--color-neutral) calc(l - 0.45) c h
    );
    --webui-color-neutral-100: oklch(
        from var(--color-neutral) calc(l + 0.38) c h
    );
    --webui-color-focus-500: var(--color-accent-blue);

    --webui-focus-shadow: 0 0 0 0.25rem var(--webui-color-focus-500);
    --webui-focus-outline: 0.25rem solid transparent;
}

:where(*, *::after, *::before) {
    box-sizing: border-box;
}

* {
    background: transparent;
    border: 0;
    margin: 0;
    padding: 0;
    vertical-align: baseline;
}

body {
    color: var(--webui-color-neutral-900);
    font-family: system-ui, sans-serif;
    line-height: 1.5;
}

button {
    appearance: none;
    cursor: pointer;
    font: inherit;
    line-height: 1;
    -webkit-tap-highlight-color: oklch(0% 0 0 / 0%);

    &:focus-visible {
        box-shadow: var(--webui-focus-shadow);
        outline: var(--webui-focus-outline);
    }

    &:focus:not(:focus-visible) {
        outline: var(--webui-focus-outline);
    }
}

.button {
    color: inherit;
    display: inline-block;
    padding: 0.5rem;
    text-decoration: none;
}

[data-button*='text'] {
    border: 0.125rem solid;
}

[data-button-style='primary'] {
    background-color: var(--webui-color-primary-500);
    color: var(--webui-color-neutral-100);

    &[data-button*='text'] {
        border-color: var(--webui-color-primary-500);
    }
}

[data-button-style='secondary'] {
    color: var(--webui-color-primary-500);
    color: light-dark(
        var(--webui-color-primary-500),
        var(--webui-color-neutral-100)
    );

    &[data-button*='text'] {
        border-color: light-dark(
            var(--webui-color-primary-500),
            var(--webui-color-primary-100)
        );
    }
}
</style>
